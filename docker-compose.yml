services:

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
  
  backend:
    build: ./backend
    volumes:
      - static_files:/app/staticfiles
    env_file:
     - .env
    depends_on:
      - db
  
  frontend:
    build: ./frontend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/usr/share/nginx/html/static
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  static_files: